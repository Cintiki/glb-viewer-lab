<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GLB Viewer Lab</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #f5f5f5;
    }

    header {
      padding: 24px;
      border-bottom: 1px solid #333;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 32px;
    }

    p {
      margin: 0;
      color: #bbb;
    }

    main {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 24px;
      padding: 24px;
    }

    .viewer-panel {
      background: #1b1b1b;
      border: 1px solid #333;
      border-radius: 16px;
      overflow: hidden;
      min-height: 600px;
    }

    model-viewer {
      width: 100%;
      height: 600px;
      background: radial-gradient(circle, #333 0%, #111 70%);
    }

    .info-panel {
      background: #1b1b1b;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 20px;
    }

    .info-panel h2 {
      margin-top: 0;
    }

    .note {
      margin-top: 16px;
      font-size: 14px;
      color: #aaa;
      line-height: 1.5;
    }

    @media (max-width: 850px) {
      main {
        grid-template-columns: 1fr;
      }

      model-viewer {
        height: 420px;
      }

      .viewer-panel {
        min-height: 420px;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>GLB Viewer Lab</h1>
    <p>A simple test site for viewing interactive GLB models.</p>
  </header>

  <main>
    <section class="viewer-panel">
      <model-viewer
        src="sample.glb"
        alt="A 3D GLB model"
        camera-controls
        auto-rotate
        shadow-intensity="1"
        exposure="1"
        environment-image="neutral">
      </model-viewer>
    </section>

    <aside class="info-panel">
      <h2>Model Info</h2>
      <p><strong>Name:</strong> Sample GLB</p>
      <p><strong>Format:</strong> .glb</p>
      <p><strong>Status:</strong> Loaded successfully</p>

      <div class="note">
        This first version uses Google model-viewer. Once the model loads correctly,
        we can add a dropdown, JSON data, thumbnails, and multiple GLB files.
      </div>
    </aside>
  </main>
</body>
</html>
